<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Bookboy výběr</title>
  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    .container {
      display: none;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
    }

    .item {
      cursor: pointer;
    }

    img {
      width: 220px;
      height: 300px;
      object-fit: cover;
      border-radius: 12px;
    }

    .selected {
      box-shadow: 0 0 20px gold;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .bracket {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 30px;
    }

    .round {
      display: flex;
      flex-direction: column;
    }

    .match {
      background: #222;
      padding: 10px;
      border-radius: 10px;
      margin: 10px 0;
      width: 160px;
    }

    .player {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .player img {
      width: 40px;
      height: 50px;
    }

    .winner {
      border: 2px solid gold;
    }
  </style>
</head>
<body>

<h1>Koho radši? 😏</h1>

<!-- výběr hráčky -->
<div id="startScreen">
  <h2>Kdo hraje?</h2>
  <button onclick="startGame('misa')">Míša</button>
  <button onclick="startGame('market')">Markét</button>
</div>

<!-- hra -->
<div class="container" id="game">
  <div class="item" id="item0" onclick="choose(0)">
    <img id="img0"><p id="name0"></p>
  </div>
  <div class="item" id="item1" onclick="choose(1)">
    <img id="img1"><p id="name1"></p>
  </div>
</div>

<script>
// 🔥 seznam jmen (stejný pro všechny)
const names = [
  "Azriel","Cassian","Rhys","Lucien",
  "Rowan","Dorian","Lorcan","Chaol",
  "Hunt","Ruhn","Tharion",
  "Xaden","Samkiel","Luther"
];

let data = [];
let currentRound = [];
let nextRound = [];
let currentPair = [];
let rounds = [];
let currentRoundMatches = [];

function startGame(player) {
  // vytvoří data podle složky hráčky
  data = names.map(n => ({
    name: n,
    img: `images/${player}/${n}.jpg`
  }));

  currentRound = shuffle([...data]);
  nextRound = [];
  rounds = [];
  currentRoundMatches = [];

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("game").style.display = "flex";

  nextPair();
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function nextPair() {
  if (currentRound.length === 1 && nextRound.length === 0) {
    if (currentRoundMatches.length > 0) {
      rounds.push(currentRoundMatches);
    }
    showWinner(currentRound[0]);
    return;
  }

  if (currentRound.length < 2) {
    rounds.push(currentRoundMatches);
    currentRoundMatches = [];
    currentRound = nextRound;
    nextRound = [];
    nextPair();
    return;
  }

  currentPair = [currentRound.pop(), currentRound.pop()];
  update();
}

function update() {
  document.getElementById("img0").src = currentPair[0].img;
  document.getElementById("name0").innerText = currentPair[0].name;

  document.getElementById("img1").src = currentPair[1].img;
  document.getElementById("name1").innerText = currentPair[1].name;
}

function choose(index) {
  let winner = currentPair[index];

  document.getElementById("item" + index).classList.add("selected");

  setTimeout(() => {
    document.getElementById("item" + index).classList.remove("selected");

    currentRoundMatches.push({
      p1: currentPair[0].name,
      p2: currentPair[1].name,
      winner: winner.name
    });

    nextRound.push(winner);
    nextPair();
  }, 200);
}

function showWinner(winner) {
  let html = `<div class="bracket">`;

  rounds.forEach(round => {
    html += `<div class="round">`;
    round.forEach(match => {
      let p1 = data.find(p => p.name === match.p1);
      let p2 = data.find(p => p.name === match.p2);

      html += `
        <div class="match">
          <div class="player ${match.winner===match.p1?"winner":""}">
            <img src="${p1.img}">${p1.name}
          </div>
          <div class="player ${match.winner===match.p2?"winner":""}">
            <img src="${p2.img}">${p2.name}
          </div>
        </div>
      `;
    });
    html += `</div>`;
  });

  html += `</div>`;

  document.body.innerHTML = `
    <h1>👑 ${winner.name} 👑</h1>
    <img src="${winner.img}" style="width:250px">
    ${html}
    <br><button onclick="location.reload()">Znovu</button>
  `;
}
</script>

</body>
</html>
